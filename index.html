<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, pink, #ffb6c1);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    backdrop-filter: blur(5px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
}

button {
    padding: 15px 30px;
    font-size: clamp(16px, 4vw, 20px);
    border: none;
    border-radius: 50px;
    background: white;
    color: #ff69b4;
    cursor: pointer;
    transition: all 0.3s ease;
    width: auto;
    min-width: 200px;
    max-width: 100%;
    margin: 10px 0;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

button:active {
    transform: scale(0.95);
}

#msg {
    font-size: clamp(20px, 5vw, 28px);
    margin-top: 30px;
    font-weight: bold;
    animation: fadeIn 0.5s ease;
    word-break: break-word;
    padding: 0 10px;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 15px;
    }
    
    button {
        min-width: 160px;
        padding: 12px 20px;
    }
}

/* Landscape mode optimization */
@media (max-height: 600px) and (orientation: landscape) {
    body {
        padding: 10px;
    }
    
    h1 {
        margin-top: 10px;
        font-size: clamp(24px, 6vh, 40px);
    }
    
    .container {
        padding: 15px;
    }
}

/* Add some floating hearts for extra romance */
.heart {
    position: fixed;
    font-size: 20px;
    opacity: 0.6;
    animation: float 3s infinite;
    pointer-events: none;
    z-index: -1;
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
}

/* Position hearts */
.heart:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
.heart:nth-child(2) { top: 20%; right: 15%; animation-delay: 0.5s; }
.heart:nth-child(3) { bottom: 15%; left: 20%; animation-delay: 1s; }
.heart:nth-child(4) { bottom: 25%; right: 25%; animation-delay: 1.5s; }
</style>
</head>

<body>
    <!-- Floating hearts decoration -->
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>

    <div class="container">
        <h1>Happy Birthday My Love 🎂</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <button onclick="showMessage()">Click for a Surprise</button>
        
        <p id="msg"></p>
    </div>

    <script>
    function showMessage() {
        document.getElementById("msg").innerHTML = "I love you more than words can say 💕";
        
        // Add a little bounce effect to the message
        document.getElementById("msg").style.animation = "none";
        setTimeout(() => {
            document.getElementById("msg").style.animation = "fadeIn 0.5s ease";
        }, 10);
    }

    // Optional: Add touch support for mobile
    if ('ontouchstart' in window) {
        document.querySelector('button').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95)';
        });
        
        document.querySelector('button').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1)';
        });
    }
    </script>
</body>
</html>

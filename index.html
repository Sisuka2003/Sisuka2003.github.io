<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, pink, #ffb6c1);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    z-index: 10;
    animation: containerGlow 3s infinite alternate;
}

@keyframes containerGlow {
    0% { box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3); }
    100% { box-shadow: 0 8px 32px rgba(255, 20, 147, 0.6); }
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
    animation: bounce 2s infinite;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
    animation: fadeInOut 3s infinite;
}

@keyframes fadeInOut {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
}

button {
    padding: 18px 35px;
    font-size: clamp(18px, 4vw, 22px);
    border: none;
    border-radius: 60px;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: all 0.3s ease;
    width: auto;
    min-width: 220px;
    max-width: 100%;
    margin: 20px 0;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    font-weight: bold;
    position: relative;
    overflow: hidden;
    z-index: 1;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: left 0.5s;
    z-index: -1;
}

button:hover::before {
    left: 100%;
}

button:hover {
    transform: scale(1.1) rotate(2deg);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
}

button:active {
    transform: scale(0.95) rotate(-2deg);
}

#msg {
    font-size: clamp(22px, 6vw, 30px);
    margin-top: 30px;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.5);
    word-break: break-word;
    padding: 15px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    animation: messagePop 0.5s ease;
}

@keyframes messagePop {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
}

/* Confetti and celebration elements */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: #f00;
    opacity: 0.7;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 3s linear forwards;
}

@keyframes confettiFall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
    }
    100% {
        transform: translateY(100vh) rotate(720deg);
    }
}

/* Floating hearts animation */
.floating-heart {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 9998;
    animation: heartFloat 4s ease-out forwards;
}

@keyframes heartFloat {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    50% {
        opacity: 1;
        transform: translateY(50vh) scale(1.2);
    }
    100% {
        transform: translateY(-100px) scale(0.8);
        opacity: 0;
    }
}

/* Cheering emojis */
.cheer {
    position: fixed;
    font-size: 40px;
    pointer-events: none;
    z-index: 9997;
    animation: cheerPop 1s ease-out forwards;
}

@keyframes cheerPop {
    0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
    }
    50% {
        transform: scale(1.5) rotate(180deg);
        opacity: 1;
    }
    100% {
        transform: scale(1) rotate(360deg);
        opacity: 0;
    }
}

/* Sparkle effect */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background-color: gold;
    pointer-events: none;
    z-index: 9996;
    animation: sparkleTwinkle 1.5s linear forwards;
}

@keyframes sparkleTwinkle {
    0% {
        transform: scale(0);
        opacity: 0;
    }
    50% {
        transform: scale(2);
        opacity: 1;
        box-shadow: 0 0 20px gold;
    }
    100% {
        transform: scale(0);
        opacity: 0;
    }
}

/* Firework effect */
.firework {
    position: fixed;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9995;
    animation: fireworkExplode 1s ease-out forwards;
}

@keyframes fireworkExplode {
    0% {
        transform: scale(0);
        opacity: 0;
    }
    50% {
        transform: scale(30);
        opacity: 0.8;
    }
    100% {
        transform: scale(40);
        opacity: 0;
    }
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 20px 15px;
    }
    
    button {
        min-width: 180px;
        padding: 15px 25px;
    }
}

/* Landscape mode optimization */
@media (max-height: 600px) and (orientation: landscape) {
    body {
        padding: 10px;
    }
    
    h1 {
        font-size: clamp(24px, 6vh, 40px);
        margin-bottom: 10px;
    }
    
    .container {
        padding: 15px;
    }
    
    button {
        margin: 10px 0;
        padding: 12px 25px;
    }
}

/* Decorative static hearts */
.decorative-heart {
    position: fixed;
    font-size: 24px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 1;
    animation: decorativeFloat 8s infinite alternate;
}

@keyframes decorativeFloat {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, -20px) rotate(20deg); }
}

.decorative-heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
.decorative-heart:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
.decorative-heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
.decorative-heart:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; }
.decorative-heart:nth-child(5) { top: 50%; left: 3%; animation-delay: 4s; }
.decorative-heart:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }
</style>
</head>

<body>
    <!-- Decorative static hearts in background -->
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>

    <div class="container">
        <h1>🎉 Happy Birthday My Love! 🎉</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <button onclick="celebrate()">🎈 Click to Celebrate! 🎈</button>
        
        <div id="msg"></div>
    </div>

    <script>
    function celebrate() {
        // Show the love message
        document.getElementById("msg").innerHTML = "I love you more than words can say 💕";
        
        // Trigger all celebration effects
        createConfetti(50);
        createHearts(30);
        createCheers(20);
        createSparkles(40);
        createFireworks(5);
        
        // Play a little celebration with sound effect (optional - browser might block autoplay)
        // playCelebrationSound();
        
        // Add bounce effect to container
        document.querySelector('.container').style.animation = 'none';
        setTimeout(() => {
            document.querySelector('.container').style.animation = 'containerGlow 3s infinite alternate';
        }, 10);
    }

    // Confetti creator
    function createConfetti(count) {
        const colors = ['#ff1493', '#ff69b4', '#ffb6c1', '#ffd700', '#ff4500', '#ff8c00', '#ff00ff', '#ff6347'];
        
        for (let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 15 + 5 + 'px';
            confetti.style.height = Math.random() * 15 + 5 + 'px';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            document.body.appendChild(confetti);
            
            // Remove after animation
            setTimeout(() => {
                confetti.remove();
            }, 4000);
        }
    }

    // Floating hearts creator
    function createHearts(count) {
        for (let i = 0; i < count; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = Math.random() * 30 + 20 + 'px';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    }

    // Cheering emojis creator
    function createCheers(count) {
        const cheers = ['🎉', '🎊', '🥳', '🎂', '🎈', '✨', '⭐', '🌟', '💫', '⚡', '🔥', '💥'];
        
        for (let i = 0; i < count; i++) {
            const cheer = document.createElement('div');
            cheer.className = 'cheer';
            cheer.innerHTML = cheers[Math.floor(Math.random() * cheers.length)];
            cheer.style.left = Math.random() * 100 + '%';
            cheer.style.top = Math.random() * 100 + '%';
            cheer.style.fontSize = Math.random() * 30 + 30 + 'px';
            cheer.style.animationDelay = Math.random() * 0.5 + 's';
            document.body.appendChild(cheer);
            
            setTimeout(() => {
                cheer.remove();
            }, 1500);
        }
    }

    // Sparkles creator
    function createSparkles(count) {
        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 1 + 's';
            sparkle.style.backgroundColor = ['gold', '#ffd700', '#ffff00', '#ffa500'][Math.floor(Math.random() * 4)];
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }
    }

    // Fireworks creator
    function createFireworks(count) {
        const colors = ['#ff1493', '#ff69b4', '#ffd700', '#ff4500', '#ff00ff', '#00ffff'];
        
        for (let i = 0; i < count; i++) {
            const firework = document.createElement('div');
            firework.className = 'firework';
            firework.style.left = Math.random() * 100 + '%';
            firework.style.top = Math.random() * 100 + '%';
            firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            firework.style.animationDelay = i * 0.2 + 's';
            document.body.appendChild(firework);
            
            setTimeout(() => {
                firework.remove();
            }, 2000);
        }
    }

    // Optional: Try to play a celebration sound (browsers might block this without user interaction)
    function playCelebrationSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Simple "cheer" sound using Web Audio API
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // Create a simple oscillator for a "ding" sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        } catch (e) {
            console.log('Audio not supported or blocked');
        }
    }

    // Add touch support for mobile
    if ('ontouchstart' in window) {
        document.querySelector('button').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95) rotate(-2deg)';
        });
        
        document.querySelector('button').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1) rotate(0deg)';
        });
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    z-index: 10;
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
}

.button-container {
    position: relative;
    margin: 20px 0;
    min-height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 18px 35px;
    font-size: clamp(18px, 4vw, 22px);
    border: none;
    border-radius: 60px;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    width: auto;
    min-width: 220px;
    max-width: 100%;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    font-weight: bold;
    position: relative;
    overflow: hidden;
    z-index: 10;
    border: 2px solid rgba(255, 255, 255, 0.5);
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
}

button:active {
    transform: scale(0.95);
}

button.hidden {
    display: none;
}

/* Smooth Bubble Animation - Optimized with GPU acceleration */
.bubble-icon {
    position: fixed;
    bottom: -10px;
    pointer-events: none;
    z-index: 9999;
    filter: drop-shadow(0 5px 15px rgba(255, 20, 147, 0.3));
    opacity: 0;
    will-change: transform, opacity;
    transform: translateZ(0); /* GPU acceleration */
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

/* Ultra-smooth float up animation with cubic-bezier */
.bubble-icon.smooth-1 {
    animation: smoothFloat1 3.2s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}

@keyframes smoothFloat1 {
    0% {
        transform: translate3d(0, 0, 0) scale(0.2);
        opacity: 0;
    }
    8% {
        opacity: 0.9;
        transform: translate3d(0, -8vh, 0) scale(0.5);
    }
    25% {
        transform: translate3d(0, -25vh, 0) scale(0.9);
    }
    45% {
        transform: translate3d(0, -45vh, 0) scale(1.2);
    }
    65% {
        transform: translate3d(0, -65vh, 0) scale(1.1);
    }
    85% {
        transform: translate3d(0, -85vh, 0) scale(0.8);
        opacity: 0.7;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.3);
        opacity: 0;
    }
}

.bubble-icon.smooth-2 {
    animation: smoothFloat2 3.5s cubic-bezier(0.42, 0, 0.58, 1) forwards;
}

@keyframes smoothFloat2 {
    0% {
        transform: translate3d(0, 0, 0) scale(0.15);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translate3d(0, -10vh, 0) scale(0.6);
    }
    30% {
        transform: translate3d(0, -30vh, 0) scale(1);
    }
    50% {
        transform: translate3d(0, -50vh, 0) scale(1.3);
    }
    70% {
        transform: translate3d(0, -70vh, 0) scale(1.1);
        opacity: 0.8;
    }
    90% {
        transform: translate3d(0, -90vh, 0) scale(0.7);
        opacity: 0.4;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.2);
        opacity: 0;
    }
}

.bubble-icon.smooth-3 {
    animation: smoothFloat3 3.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
}

@keyframes smoothFloat3 {
    0% {
        transform: translate3d(0, 0, 0) scale(0.1);
        opacity: 0;
    }
    5% {
        opacity: 0.8;
        transform: translate3d(5px, -5vh, 0) scale(0.4);
    }
    15% {
        transform: translate3d(-8px, -15vh, 0) scale(0.7);
    }
    30% {
        transform: translate3d(10px, -30vh, 0) scale(1);
    }
    45% {
        transform: translate3d(-12px, -45vh, 0) scale(1.2);
    }
    60% {
        transform: translate3d(8px, -60vh, 0) scale(1.3);
    }
    75% {
        transform: translate3d(-5px, -75vh, 0) scale(1.1);
        opacity: 0.7;
    }
    90% {
        transform: translate3d(3px, -90vh, 0) scale(0.7);
        opacity: 0.3;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.2);
        opacity: 0;
    }
}

.bubble-icon.smooth-4 {
    animation: smoothFloat4 3.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

@keyframes smoothFloat4 {
    0% {
        transform: translate3d(0, 0, 0) scale(0.25);
        opacity: 0;
    }
    12% {
        opacity: 0.95;
        transform: translate3d(-8px, -12vh, 0) scale(0.6);
    }
    28% {
        transform: translate3d(12px, -28vh, 0) scale(0.9);
    }
    44% {
        transform: translate3d(-10px, -44vh, 0) scale(1.1);
    }
    60% {
        transform: translate3d(15px, -60vh, 0) scale(1.2);
    }
    76% {
        transform: translate3d(-7px, -76vh, 0) scale(1);
        opacity: 0.6;
    }
    92% {
        transform: translate3d(5px, -92vh, 0) scale(0.6);
        opacity: 0.3;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.2);
        opacity: 0;
    }
}

.bubble-icon.smooth-5 {
    animation: smoothFloat5 3.6s cubic-bezier(0.645, 0.045, 0.355, 1) forwards;
}

@keyframes smoothFloat5 {
    0% {
        transform: translate3d(0, 0, 0) scale(0.2);
        opacity: 0;
    }
    7% {
        opacity: 1;
        transform: translate3d(10px, -7vh, 0) scale(0.5);
    }
    22% {
        transform: translate3d(-15px, -22vh, 0) scale(0.8);
    }
    37% {
        transform: translate3d(20px, -37vh, 0) scale(1);
    }
    52% {
        transform: translate3d(-18px, -52vh, 0) scale(1.2);
    }
    67% {
        transform: translate3d(12px, -67vh, 0) scale(1.1);
        opacity: 0.8;
    }
    82% {
        transform: translate3d(-8px, -82vh, 0) scale(0.8);
        opacity: 0.5;
    }
    97% {
        transform: translate3d(5px, -97vh, 0) scale(0.5);
        opacity: 0.2;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.2);
        opacity: 0;
    }
}

/* Extra smooth slow variant */
.bubble-icon.extra-smooth {
    animation: extraSmoothFloat 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes extraSmoothFloat {
    0% {
        transform: translate3d(0, 0, 0) scale(0.15);
        opacity: 0;
    }
    5% {
        opacity: 0.8;
        transform: translate3d(5px, -5vh, 0) scale(0.4);
    }
    20% {
        transform: translate3d(-8px, -20vh, 0) scale(0.7);
    }
    35% {
        transform: translate3d(10px, -35vh, 0) scale(1);
    }
    50% {
        transform: translate3d(-12px, -50vh, 0) scale(1.2);
    }
    65% {
        transform: translate3d(8px, -65vh, 0) scale(1.1);
        opacity: 0.7;
    }
    80% {
        transform: translate3d(-5px, -80vh, 0) scale(0.8);
        opacity: 0.4;
    }
    95% {
        transform: translate3d(3px, -95vh, 0) scale(0.5);
        opacity: 0.2;
    }
    100% {
        transform: translate3d(0, -100vh, 0) scale(0.2);
        opacity: 0;
    }
}

/* Decorative static hearts */
.decorative-heart {
    position: fixed;
    font-size: 24px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 1;
    animation: decorativeFloat 10s infinite alternate ease-in-out;
    transform: translateZ(0);
}

@keyframes decorativeFloat {
    0% { transform: translate3d(0, 0, 0) rotate(0deg); }
    100% { transform: translate3d(20px, -20px, 0) rotate(20deg); }
}

.decorative-heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
.decorative-heart:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
.decorative-heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
.decorative-heart:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; }
.decorative-heart:nth-child(5) { top: 50%; left: 3%; animation-delay: 4s; }
.decorative-heart:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

/* Love message after celebration */
.love-message {
    font-size: 32px;
    color: white;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.5);
    position: relative;
    z-index: 20;
}

.love-message.show {
    opacity: 1;
    animation: messagePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes messagePop {
    0% { transform: scale3d(0, 0, 0); }
    70% { transform: scale3d(1.1, 1.1, 1.1); }
    100% { transform: scale3d(1, 1, 1); }
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 20px 15px;
    }
    
    button {
        min-width: 180px;
        padding: 15px 25px;
    }
}
</style>
</head>

<body>
    <!-- Decorative static hearts in background -->
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>

    <div class="container">
        <h1>🎉 Happy Birthday My Love! 🎉</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <div class="button-container">
            <button id="celebrateBtn" onclick="startCelebration()">🎈 Click to Celebrate! 🎈</button>
        </div>
        
        <div id="loveMessage" class="love-message"></div>
    </div>

    <script>
    let celebrationDone = false;
    let animationFrame;
    let bubbleInterval;

    function startCelebration() {
        if (celebrationDone) return;
        
        // Hide the button immediately
        document.getElementById('celebrateBtn').classList.add('hidden');
        
        // Use requestAnimationFrame for smoother animation start
        animationFrame = requestAnimationFrame(() => {
            // Start with slow bubbles and increase intensity
            let intensity = 0;
            const totalBubbles = 600; // Even more bubbles for smoother appearance
            let bubblesCreated = 0;
            
            // Function to calculate bubble creation rate based on time
            function getBubbleDelay() {
                // Start with 80ms delay, end with 15ms delay for smoother flow
                const progress = Math.min(bubblesCreated / totalBubbles, 1);
                const delay = 80 - (progress * 65);
                return Math.max(15, Math.min(80, delay));
            }
            
            // Create bubbles with increasing intensity
            function createNextBubble() {
                if (bubblesCreated >= totalBubbles) return;
                
                // Create multiple bubbles at once for denser effect
                const batchSize = Math.floor(Math.random() * 4) + 2; // 2-5 bubbles at once
                for (let i = 0; i < batchSize; i++) {
                    if (bubblesCreated < totalBubbles) {
                        createBubble();
                        bubblesCreated++;
                    }
                }
                
                // Schedule next batch with current intensity
                const nextDelay = getBubbleDelay();
                bubbleInterval = setTimeout(createNextBubble, nextDelay);
            }
            
            // Start creating bubbles
            bubbleInterval = setTimeout(createNextBubble, 20);
        });
        
        // After 3 seconds, show love message and final bubbles
        setTimeout(() => {
            // Clear the interval
            if (bubbleInterval) {
                clearTimeout(bubbleInterval);
            }
            
            // Show love message
            document.getElementById('loveMessage').classList.add('show');
            document.getElementById('loveMessage').innerHTML = "I love you! ❤️🎉";
            
            // Add a massive final burst of bubbles (smoothly)
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    // Create multiple bubbles for final burst
                    for (let j = 0; j < 3; j++) {
                        createBubble();
                    }
                }, i * 8); // Small delay between each for smooth flow
            }
        }, 3000);
        
        celebrationDone = true;
    }

    function createBubble() {
        // Use requestAnimationFrame for smoother DOM insertion
        requestAnimationFrame(() => {
            // Massive icon collection for variety
            const icons = [
                // Hearts (lots of these)
                '❤️', '❤️', '❤️', '❤️', '💕', '💕', '💕', '💖', '💖', '💖', 
                '💗', '💗', '💓', '💓', '💘', '💘', '💝', '💝', '💞', '💞',
                '❣️', '💟', '💌', '💋', '💄', '👄',
                // Celebrations
                '🎉', '🎉', '🎉', '🎊', '🎊', '🥳', '🥳', '🎂', '🎈', '🎈', 
                '🎈', '🎁', '🎁', '🎀', '🎀', '🎆', '🎇', '✨',
                // Stars & Sparkles
                '✨', '✨', '✨', '⭐', '⭐', '🌟', '🌟', '💫', '💫', '💫',
                '⚡', '☄️', '🌠', '🌌',
                // Flowers
                '🌸', '🌸', '🌸', '🌹', '🌹', '🌺', '🌷', '🌷', '💐', '💐',
                '🌼', '🌻', '🌞', '🌝',
                // Cute things
                '🦋', '🦋', '🦋', '🐝', '🐝', '🐞', '🕊️', '🕊️', '🌈', '🌈',
                '☁️', '⛅', '🌟', '💧', '🫧', '🫧', '🫧',
                // Food & Treats
                '🍰', '🧁', '🍦', '🍨', '🍧', '🍩', '🍪', '🍫', '🍬', '🍭',
                '🥂', '🍾', '🍷', '🥤'
            ];
            
            // Smooth animation classes
            const animations = [
                'bubble-icon smooth-1',
                'bubble-icon smooth-2', 
                'bubble-icon smooth-3',
                'bubble-icon smooth-4',
                'bubble-icon smooth-5',
                'bubble-icon extra-smooth'
            ];
            
            // Create multiple bubbles at once for denser effect
            const batchCount = Math.random() > 0.5 ? 2 : 1;
            
            for (let b = 0; b < batchCount; b++) {
                // Create bubble element
                const bubble = document.createElement('div');
                bubble.className = animations[Math.floor(Math.random() * animations.length)];
                bubble.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                
                // Spread across full width with slight clustering for natural look
                let leftPos;
                if (Math.random() > 0.7) {
                    // Cluster some bubbles together for more natural look
                    leftPos = (Math.random() * 30 + 35) + '%'; // Middle cluster
                } else {
                    leftPos = Math.random() * 98 + 1 + '%'; // Full spread
                }
                bubble.style.left = leftPos;
                
                // Random size (small to large) for variety
                const size = Math.random() * 30 + 15; // 15px to 45px
                bubble.style.fontSize = size + 'px';
                
                // Small random rotation for some bubbles
                if (Math.random() > 0.7) {
                    bubble.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
                }
                
                // Random delay for smoother flow (0 to 0.8 seconds)
                bubble.style.animationDelay = Math.random() * 0.8 + 's';
                
                // Add to body
                document.body.appendChild(bubble);
                
                // Remove after animation completes
                setTimeout(() => {
                    if (bubble.parentNode) {
                        requestAnimationFrame(() => {
                            bubble.remove();
                        });
                    }
                }, 5000);
            }
        });
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        if (animationFrame) {
            cancelAnimationFrame(animationFrame);
        }
        if (bubbleInterval) {
            clearTimeout(bubbleInterval);
        }
    });

    // Add touch support for mobile
    if ('ontouchstart' in window) {
        document.getElementById('celebrateBtn').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95)';
        });
        
        document.getElementById('celebrateBtn').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1)';
        });
    }
    </script>
</body>
</html>

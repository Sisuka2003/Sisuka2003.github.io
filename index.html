<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
body{
text-align:center;
font-family:Arial;
background:linear-gradient(pink,#ffb6c1);
color:white;
}

h1{
margin-top:100px;
font-size:60px;
}

p{
font-size:25px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:white;
color:pink;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Happy Birthday My Love 🎂</h1>

<p>You make my world brighter every day ❤️</p>

<button onclick="showMessage()">Click for a Surprise</button>

<p id="msg"></p>

<script>
function showMessage(){
document.getElementById("msg").innerHTML =
"I love you more than words can say 💕";
}
</script>

</body>
</html>

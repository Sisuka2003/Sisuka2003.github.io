<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, pink, #ffb6c1);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    z-index: 10;
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
}

.button-container {
    position: relative;
    margin: 20px 0;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 18px 35px;
    font-size: clamp(18px, 4vw, 22px);
    border: none;
    border-radius: 60px;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: all 0.3s ease;
    width: auto;
    min-width: 220px;
    max-width: 100%;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    font-weight: bold;
    position: relative;
    overflow: hidden;
    z-index: 10;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
}

button:active {
    transform: scale(0.95);
}

button.hidden {
    display: none;
}

/* Cake Section */
.cake-section {
    margin-top: 20px;
    text-align: center;
}

.cake-container {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: cakePop 0.5s ease;
}

.cake-container.show {
    display: flex;
}

@keyframes cakePop {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}

.cake {
    font-size: 120px;
    line-height: 1;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
    animation: cakeFloat 3s infinite alternate;
    cursor: pointer;
    transition: transform 0.2s;
}

.cake:hover {
    transform: scale(1.1);
}

.cake:active {
    transform: scale(0.9);
}

@keyframes cakeFloat {
    0% { transform: translateY(0); }
    100% { transform: translateY(-10px); }
}

.blow-text {
    font-size: 48px;
    font-weight: bold;
    color: white;
    text-shadow: 3px 3px 6px rgba(255, 20, 147, 0.5);
    margin-top: 10px;
    animation: blinkText 1.5s infinite;
    cursor: pointer;
    padding: 10px 30px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    border: 2px solid white;
}

@keyframes blinkText {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); background: rgba(255, 255, 255, 0.3); }
}

.blow-instruction {
    font-size: 18px;
    margin-top: 10px;
    color: rgba(255, 255, 255, 0.9);
}

/* Celebration Animation Elements - 1.5 second duration */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: #f00;
    opacity: 0.7;
    pointer-events: none;
    z-index: 9999;
    top: -10px;
    animation: confettiFall 1.5s ease-out forwards;
}

@keyframes confettiFall {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

.floating-heart {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 9998;
    bottom: -50px;
    animation: heartFloat 1.5s ease-out forwards;
}

@keyframes heartFloat {
    0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
    }
    20% {
        opacity: 1;
        transform: scale(1);
    }
    100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
    }
}

.cheer {
    position: fixed;
    font-size: 40px;
    pointer-events: none;
    z-index: 9997;
    top: -50px;
    left: 0;
    animation: cheerFall 1.5s ease-out forwards;
}

@keyframes cheerFall {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
    }
    20% {
        opacity: 1;
        transform: rotate(180deg);
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background-color: gold;
    pointer-events: none;
    z-index: 9996;
    top: -10px;
    animation: sparkleFall 1.5s linear forwards;
}

@keyframes sparkleFall {
    0% {
        transform: translateY(0) scale(0);
        opacity: 0;
    }
    20% {
        transform: scale(2);
        opacity: 1;
        box-shadow: 0 0 20px gold;
    }
    100% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
    }
}

/* Decorative static hearts */
.decorative-heart {
    position: fixed;
    font-size: 24px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 1;
    animation: decorativeFloat 8s infinite alternate;
}

@keyframes decorativeFloat {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, -20px) rotate(20deg); }
}

.decorative-heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
.decorative-heart:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
.decorative-heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
.decorative-heart:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; }
.decorative-heart:nth-child(5) { top: 50%; left: 3%; animation-delay: 4s; }
.decorative-heart:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

/* Blow effect when clicking cake */
@keyframes candleBlow {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
}

.candle-blow {
    animation: candleBlow 0.5s forwards;
}

@keyframes messageAppear {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.love-message {
    font-size: 32px;
    color: white;
    margin-top: 20px;
    animation: messageAppear 0.5s ease;
    text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.5);
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 20px 15px;
    }
    
    button {
        min-width: 180px;
        padding: 15px 25px;
    }
    
    .cake {
        font-size: 80px;
    }
    
    .blow-text {
        font-size: 36px;
    }
}
</style>
</head>

<body>
    <!-- Decorative static hearts in background -->
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>

    <div class="container">
        <h1>🎉 Happy Birthday My Love! 🎉</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <div class="button-container">
            <button id="celebrateBtn" onclick="startCelebration()">🎈 Click to Celebrate! 🎈</button>
        </div>
        
        <!-- Cake Section (initially hidden) -->
        <div id="cakeSection" class="cake-section">
            <div id="cakeContainer" class="cake-container">
                <div class="cake" id="cake" onclick="blowCandle()">🎂</div>
                <div class="blow-text" id="blowText" onclick="blowCandle()">BLOW!</div>
                <div class="blow-instruction">👇 Click the cake or BLOW! to blow the candle 👇</div>
            </div>
        </div>
        
        <div id="loveMessage" class="love-message"></div>
    </div>

    <script>
    let celebrationDone = false;
    let candleBlown = false;

    function startCelebration() {
        if (celebrationDone) return;
        
        // Hide the button
        document.getElementById('celebrateBtn').classList.add('hidden');
        
        // Start 1.5 second celebration animations
        createConfetti(40);
        createHearts(30);
        createCheers(25);
        createSparkles(35);
        
        // After 1.5 seconds, show the cake
        setTimeout(() => {
            document.getElementById('cakeContainer').classList.add('show');
            celebrationDone = true;
        }, 1500);
    }

    function blowCandle() {
        if (candleBlown) return;
        
        candleBlown = true;
        
        // Get cake element
        const cake = document.getElementById('cake');
        
        // Add blow animation
        cake.classList.add('candle-blow');
        document.getElementById('blowText').style.opacity = '0';
        
        // Show love message after blowing
        setTimeout(() => {
            document.getElementById('loveMessage').innerHTML = "I love you! ❤️🎂";
            
            // Hide the blow text
            document.getElementById('blowText').style.display = 'none';
            document.querySelector('.blow-instruction').style.display = 'none';
            
            // Change cake to blown out version
            cake.innerHTML = '🍰'; // Cake without candle
            cake.classList.remove('candle-blow');
            cake.style.animation = 'none';
            
            // One final small celebration
            createConfetti(15);
            createHearts(10);
        }, 500);
    }

    // Confetti creator
    function createConfetti(count) {
        const colors = ['#ff1493', '#ff69b4', '#ffb6c1', '#ffd700', '#ff4500', '#ff8c00', '#ff00ff', '#ff6347'];
        
        for (let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.animationDelay = Math.random() * 0.3 + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 15 + 5 + 'px';
            confetti.style.height = Math.random() * 15 + 5 + 'px';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            document.body.appendChild(confetti);
            
            setTimeout(() => {
                confetti.remove();
            }, 1800);
        }
    }

    // Floating hearts creator
    function createHearts(count) {
        for (let i = 0; i < count; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = Math.random() * 30 + 20 + 'px';
            heart.style.animationDelay = Math.random() * 0.3 + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 1800);
        }
    }

    // Cheering emojis creator
    function createCheers(count) {
        const cheers = ['🎉', '🎊', '🥳', '🎂', '🎈', '✨', '⭐', '🌟', '💫', '⚡', '🔥', '💥'];
        
        for (let i = 0; i < count; i++) {
            const cheer = document.createElement('div');
            cheer.className = 'cheer';
            cheer.innerHTML = cheers[Math.floor(Math.random() * cheers.length)];
            cheer.style.left = Math.random() * 100 + '%';
            cheer.style.fontSize = Math.random() * 30 + 30 + 'px';
            cheer.style.animationDelay = Math.random() * 0.2 + 's';
            document.body.appendChild(cheer);
            
            setTimeout(() => {
                cheer.remove();
            }, 1700);
        }
    }

    // Sparkles creator
    function createSparkles(count) {
        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.animationDelay = Math.random() * 0.3 + 's';
            sparkle.style.backgroundColor = ['gold', '#ffd700', '#ffff00', '#ffa500'][Math.floor(Math.random() * 4)];
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 1700);
        }
    }

    // Add touch support for mobile
    if ('ontouchstart' in window) {
        document.getElementById('celebrateBtn').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95)';
        });
        
        document.getElementById('celebrateBtn').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1)';
        });
    }
    </script>
</body>
</html>

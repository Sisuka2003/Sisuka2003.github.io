<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Chuti❤️ </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, pink, #ffb6c1);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    z-index: 10;
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
}

.button-container {
    position: relative;
    margin: 20px 0;
    min-height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 18px 35px;
    font-size: clamp(18px, 4vw, 22px);
    border: none;
    border-radius: 60px;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: all 0.3s ease;
    width: auto;
    min-width: 220px;
    max-width: 100%;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    font-weight: bold;
    position: relative;
    overflow: hidden;
    z-index: 10;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
}

button:active {
    transform: scale(0.95);
}

button.hidden {
    display: none;
}

/* Bubble Animation - All icons start from bottom and float up */
.bubble-icon {
    position: fixed;
    bottom: -50px; /* Start below screen */
    pointer-events: none;
    z-index: 9999;
    animation: bubbleUp 3s linear forwards;
    filter: drop-shadow(0 5px 15px rgba(255, 20, 147, 0.3));
}

@keyframes bubbleUp {
    0% {
        transform: translateY(0) scale(0.3);
        opacity: 0;
    }
    10% {
        opacity: 0.9;
        transform: translateY(-10vh) scale(0.6);
    }
    25% {
        transform: translateY(-25vh) scale(0.8);
    }
    40% {
        transform: translateY(-40vh) scale(1);
    }
    55% {
        transform: translateY(-55vh) scale(1.1);
    }
    70% {
        transform: translateY(-70vh) scale(1);
    }
    85% {
        transform: translateY(-85vh) scale(0.8);
        opacity: 0.7;
    }
    100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
    }
}

/* Different speeds for variety */
.bubble-icon.slow {
    animation: bubbleUpSlow 3s linear forwards;
}

@keyframes bubbleUpSlow {
    0% {
        transform: translateY(0) scale(0.2);
        opacity: 0;
    }
    15% {
        opacity: 0.8;
        transform: translateY(-15vh) scale(0.5);
    }
    35% {
        transform: translateY(-35vh) scale(0.8);
    }
    55% {
        transform: translateY(-55vh) scale(1);
    }
    75% {
        transform: translateY(-75vh) scale(0.9);
        opacity: 0.6;
    }
    100% {
        transform: translateY(-100vh) scale(0.4);
        opacity: 0;
    }
}

.bubble-icon.fast {
    animation: bubbleUpFast 3s linear forwards;
}

@keyframes bubbleUpFast {
    0% {
        transform: translateY(0) scale(0.4);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translateY(-20vh) scale(0.8);
    }
    30% {
        transform: translateY(-45vh) scale(1.1);
    }
    50% {
        transform: translateY(-65vh) scale(1.2);
    }
    70% {
        transform: translateY(-80vh) scale(1);
        opacity: 0.8;
    }
    100% {
        transform: translateY(-100vh) scale(0.6);
        opacity: 0;
    }
}

/* Slight left-right drift for bubble effect */
.bubble-icon.drift-left {
    animation: bubbleUpDriftLeft 3s linear forwards;
}

@keyframes bubbleUpDriftLeft {
    0% {
        transform: translate(0, 0) scale(0.3);
        opacity: 0;
    }
    20% {
        opacity: 0.9;
        transform: translate(-15px, -20vh) scale(0.7);
    }
    40% {
        transform: translate(-25px, -40vh) scale(0.9);
    }
    60% {
        transform: translate(-15px, -60vh) scale(1.1);
    }
    80% {
        transform: translate(-5px, -80vh) scale(1);
        opacity: 0.7;
    }
    100% {
        transform: translate(0, -100vh) scale(0.5);
        opacity: 0;
    }
}

.bubble-icon.drift-right {
    animation: bubbleUpDriftRight 3s linear forwards;
}

@keyframes bubbleUpDriftRight {
    0% {
        transform: translate(0, 0) scale(0.3);
        opacity: 0;
    }
    20% {
        opacity: 0.9;
        transform: translate(15px, -20vh) scale(0.7);
    }
    40% {
        transform: translate(25px, -40vh) scale(0.9);
    }
    60% {
        transform: translate(15px, -60vh) scale(1.1);
    }
    80% {
        transform: translate(5px, -80vh) scale(1);
        opacity: 0.7;
    }
    100% {
        transform: translate(0, -100vh) scale(0.5);
        opacity: 0;
    }
}

/* Decorative static hearts */
.decorative-heart {
    position: fixed;
    font-size: 24px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 1;
    animation: decorativeFloat 8s infinite alternate;
}

@keyframes decorativeFloat {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, -20px) rotate(20deg); }
}

.decorative-heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
.decorative-heart:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
.decorative-heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
.decorative-heart:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; }
.decorative-heart:nth-child(5) { top: 50%; left: 3%; animation-delay: 4s; }
.decorative-heart:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

/* Love message after celebration */
.love-message {
    font-size: 32px;
    color: white;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.5);
}

.love-message.show {
    opacity: 1;
    animation: messagePop 0.5s ease;
}

@keyframes messagePop {
    0% { transform: scale(0); }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 20px 15px;
    }
    
    button {
        min-width: 180px;
        padding: 15px 25px;
    }
}
</style>
</head>

<body>
    <!-- Decorative static hearts in background -->
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>

    <div class="container">
        <h1>🎉 Happy Birthday My Love! 🎉</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <div class="button-container">
            <button id="celebrateBtn" onclick="startCelebration()">🎈 Click to Celebrate! 🎈</button>
        </div>
        
        <div id="loveMessage" class="love-message"></div>
    </div>

    <script>
    let celebrationDone = false;

    function startCelebration() {
        if (celebrationDone) return;
        
        // Hide the button immediately
        document.getElementById('celebrateBtn').classList.add('hidden');
        
        // Create bubbles for 3 seconds (icons floating up from bottom)
        const bubbleInterval = setInterval(createBubble, 60); // Create bubbles every 60ms
        
        // Stop creating bubbles after 3 seconds
        setTimeout(() => {
            clearInterval(bubbleInterval);
            
            // Show love message
            document.getElementById('loveMessage').classList.add('show');
            document.getElementById('loveMessage').innerHTML = "I love you! ❤️🎉";
            
            // Add a few final bubbles
            for (let i = 0; i < 15; i++) {
                setTimeout(() => createBubble(), i * 30);
            }
        }, 3000);
        
        celebrationDone = true;
    }

    function createBubble() {
        // Mix of different icons
        const icons = [
            '❤️', '💕', '💖', '💗', '💓', '💘', '💝', // Hearts
            '🎉', '🎊', '🥳', '🎂', '🎈', '🎁', // Celebrations
            '✨', '⭐', '🌟', '💫', '⚡', // Stars
            '🌸', '🌹', '🌺', '🌷', '💐', // Flowers
            '🦋', '🐝', '🐞', '🕊️' // Cute things
        ];
        
        // Different animation classes for variety
        const animations = [
            'bubble-icon',
            'bubble-icon slow',
            'bubble-icon fast',
            'bubble-icon drift-left',
            'bubble-icon drift-right'
        ];
        
        // Create bubble element
        const bubble = document.createElement('div');
        bubble.className = animations[Math.floor(Math.random() * animations.length)];
        bubble.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        
        // Random horizontal position (5% to 95% of screen width)
        bubble.style.left = Math.random() * 90 + 5 + '%';
        
        // Random size
        const size = Math.random() * 30 + 20;
        bubble.style.fontSize = size + 'px';
        
        // Random delay (0 to 1.5 seconds) so they don't all start at once
        bubble.style.animationDelay = Math.random() * 1.5 + 's';
        
        // Add to body
        document.body.appendChild(bubble);
        
        // Remove after animation completes (3 seconds + delay)
        setTimeout(() => {
            bubble.remove();
        }, 4500); // 3s animation + 1.5s max delay
    }

    // Add touch support for mobile
    if ('ontouchstart' in window) {
        document.getElementById('celebrateBtn').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95)';
        });
        
        document.getElementById('celebrateBtn').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1)';
        });
    }
    </script>
</body>
</html>

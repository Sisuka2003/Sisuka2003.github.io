<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 40px 0;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        nav a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 1;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 140px);
        }

        /* Birthday Text */
        .birthday-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .happy {
            font-size: 100px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .birthday {
            font-size: 100px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 5px;
            margin-top: -10px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        /* Description */
        .description {
            text-align: center;
            margin: 40px 0;
            font-size: 18px;
            line-height: 1.8;
            opacity: 0.95;
            max-width: 600px;
        }

        .description p {
            margin: 10px 0;
        }

        .description .small-text {
            font-style: italic;
            margin-top: 20px;
        }

        /* Contact Button */
        .contact-btn {
            margin-top: 30px;
        }

        .contact-btn a {
            display: inline-block;
            padding: 15px 50px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .contact-btn a:hover {
            background: white;
            color: #764ba2;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav {
                gap: 30px;
                padding: 30px 0;
                font-size: 16px;
            }

            .happy, .birthday {
                font-size: 60px;
            }

            .description {
                font-size: 16px;
                padding: 0 20px;
            }

            .contact-btn a {
                padding: 12px 40px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            nav {
                gap: 20px;
                font-size: 14px;
            }

            .happy, .birthday {
                font-size: 40px;
            }

            .description {
                font-size: 14px;
            }

            .contact-btn a {
                padding: 10px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a href="#">HOME</a>
        <a href="#">PORTFOLIO</a>
        <a href="#">CONTACT</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="birthday-text">
            <div class="happy">HAPPY</div>
            <div class="birthday">BIRTHDAY</div>
        </div>

        <div class="description">
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing</p>
            <p>elit. Donec quis facilis ligula.</p>
            <p class="small-text">Donec enim justo.</p>
        </div>

        <div class="contact-btn">
            <a href="#">Contact</a>
        </div>
    </div>
</body>
</html>

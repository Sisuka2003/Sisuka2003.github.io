<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Chuti ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, pink, #ffb6c1);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    position: relative;
    z-index: 10;
}

h1 {
    font-size: clamp(32px, 8vw, 60px);
    margin-bottom: 20px;
    line-height: 1.2;
    word-break: break-word;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
}

p {
    font-size: clamp(18px, 5vw, 25px);
    margin: 20px 0;
    line-height: 1.5;
    padding: 0 10px;
}

.button-container {
    position: relative;
    margin: 20px 0;
    min-height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
}

button {
    padding: 18px 35px;
    font-size: clamp(18px, 4vw, 22px);
    border: none;
    border-radius: 60px;
    background: white;
    color: #ff1493;
    cursor: pointer;
    transition: all 0.3s ease;
    width: auto;
    min-width: 220px;
    max-width: 100%;
    box-shadow: 0 4px 20px rgba(255, 20, 147, 0.4);
    font-weight: bold;
    position: relative;
    overflow: hidden;
    z-index: 10;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
}

button:active {
    transform: scale(0.95);
}

button.hidden {
    display: none;
}

/* Celebration Animation Elements - Random celebratory movements */
.confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    background-color: #f00;
    opacity: 0.8;
    pointer-events: none;
    z-index: 9999;
    animation: randomCelebration 3s ease-out forwards;
}

@keyframes randomCelebration {
    0% {
        transform: translate(0, 0) rotate(0deg) scale(0.5);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translate(10px, -20px) rotate(45deg) scale(1);
    }
    25% {
        transform: translate(-15px, -50px) rotate(90deg) scale(1.2);
    }
    40% {
        transform: translate(20px, -30px) rotate(135deg) scale(1);
    }
    55% {
        transform: translate(-10px, -70px) rotate(180deg) scale(1.3);
    }
    70% {
        transform: translate(15px, -40px) rotate(225deg) scale(1.1);
    }
    85% {
        transform: translate(-5px, -80px) rotate(270deg) scale(1.2);
    }
    100% {
        transform: translate(0, -100px) rotate(360deg) scale(0.8);
        opacity: 0;
    }
}

.floating-heart {
    position: fixed;
    font-size: 24px;
    pointer-events: none;
    z-index: 9998;
    animation: heartDance 3s ease-out forwards;
}

@keyframes heartDance {
    0% {
        transform: translate(0, 0) scale(0.5);
        opacity: 0;
    }
    15% {
        opacity: 1;
        transform: translate(-20px, -30px) scale(1.2) rotate(-10deg);
    }
    30% {
        transform: translate(15px, -60px) scale(1) rotate(15deg);
    }
    45% {
        transform: translate(-10px, -40px) scale(1.3) rotate(-20deg);
    }
    60% {
        transform: translate(25px, -70px) scale(1.1) rotate(25deg);
    }
    75% {
        transform: translate(-15px, -50px) scale(1.4) rotate(-15deg);
    }
    90% {
        transform: translate(10px, -80px) scale(1.2) rotate(10deg);
    }
    100% {
        transform: translate(0, -100px) scale(1) rotate(0deg);
        opacity: 0;
    }
}

.cheer {
    position: fixed;
    font-size: 40px;
    pointer-events: none;
    z-index: 9997;
    animation: cheerSpin 3s ease-out forwards;
}

@keyframes cheerSpin {
    0% {
        transform: translate(0, 0) scale(0.3) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
        transform: translate(30px, -20px) scale(1) rotate(72deg);
    }
    25% {
        transform: translate(-20px, -45px) scale(1.3) rotate(144deg);
    }
    40% {
        transform: translate(25px, -35px) scale(1.1) rotate(216deg);
    }
    55% {
        transform: translate(-30px, -60px) scale(1.4) rotate(288deg);
    }
    70% {
        transform: translate(20px, -50px) scale(1.2) rotate(360deg);
    }
    85% {
        transform: translate(-15px, -75px) scale(1.3) rotate(432deg);
    }
    100% {
        transform: translate(0, -100px) scale(1) rotate(504deg);
        opacity: 0;
    }
}

.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: gold;
    pointer-events: none;
    z-index: 9996;
    animation: sparkleTwirl 3s linear forwards;
}

@keyframes sparkleTwirl {
    0% {
        transform: translate(0, 0) scale(0);
        opacity: 0;
    }
    10% {
        transform: translate(-15px, -25px) scale(1.5);
        opacity: 1;
        box-shadow: 0 0 20px gold;
    }
    25% {
        transform: translate(20px, -45px) scale(1);
        box-shadow: 0 0 30px gold;
    }
    40% {
        transform: translate(-10px, -35px) scale(2);
        box-shadow: 0 0 40px gold;
    }
    55% {
        transform: translate(25px, -55px) scale(1.2);
        box-shadow: 0 0 30px gold;
    }
    70% {
        transform: translate(-20px, -70px) scale(1.8);
        box-shadow: 0 0 50px gold;
    }
    85% {
        transform: translate(15px, -60px) scale(1.3);
        box-shadow: 0 0 40px gold;
    }
    100% {
        transform: translate(0, -100px) scale(0);
        opacity: 0;
    }
}

.balloon {
    position: fixed;
    font-size: 35px;
    pointer-events: none;
    z-index: 9995;
    animation: balloonBounce 3s ease-out forwards;
}

@keyframes balloonBounce {
    0% {
        transform: translate(0, 0) scale(0.6);
        opacity: 0;
    }
    12% {
        opacity: 1;
        transform: translate(-25px, -30px) scale(1.1) rotate(-15deg);
    }
    28% {
        transform: translate(30px, -50px) scale(1) rotate(20deg);
    }
    42% {
        transform: translate(-20px, -40px) scale(1.2) rotate(-25deg);
    }
    58% {
        transform: translate(35px, -65px) scale(1.1) rotate(30deg);
    }
    72% {
        transform: translate(-15px, -55px) scale(1.3) rotate(-20deg);
    }
    88% {
        transform: translate(25px, -80px) scale(1.2) rotate(15deg);
    }
    100% {
        transform: translate(0, -100px) scale(1) rotate(0deg);
        opacity: 0;
    }
}

.star {
    position: fixed;
    font-size: 30px;
    pointer-events: none;
    z-index: 9994;
    animation: starTwinkle 3s ease-out forwards;
}

@keyframes starTwinkle {
    0% {
        transform: translate(0, 0) scale(0.2) rotate(0deg);
        opacity: 0;
    }
    15% {
        opacity: 1;
        transform: translate(20px, -25px) scale(1.3) rotate(30deg);
        filter: brightness(1.5);
    }
    30% {
        transform: translate(-25px, -45px) scale(1) rotate(60deg);
        filter: brightness(1);
    }
    45% {
        transform: translate(30px, -40px) scale(1.4) rotate(90deg);
        filter: brightness(1.8);
    }
    60% {
        transform: translate(-20px, -60px) scale(1.1) rotate(120deg);
        filter: brightness(1.2);
    }
    75% {
        transform: translate(25px, -70px) scale(1.3) rotate(150deg);
        filter: brightness(1.6);
    }
    90% {
        transform: translate(-15px, -85px) scale(1.2) rotate(180deg);
        filter: brightness(1.3);
    }
    100% {
        transform: translate(0, -100px) scale(0.8) rotate(210deg);
        opacity: 0;
    }
}

/* Decorative static hearts */
.decorative-heart {
    position: fixed;
    font-size: 24px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 1;
    animation: decorativeFloat 8s infinite alternate;
}

@keyframes decorativeFloat {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, -20px) rotate(20deg); }
}

.decorative-heart:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
.decorative-heart:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
.decorative-heart:nth-child(3) { bottom: 10%; left: 10%; animation-delay: 2s; }
.decorative-heart:nth-child(4) { bottom: 20%; right: 12%; animation-delay: 3s; }
.decorative-heart:nth-child(5) { top: 50%; left: 3%; animation-delay: 4s; }
.decorative-heart:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

/* Love message after celebration */
.love-message {
    font-size: 32px;
    color: white;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.5);
}

.love-message.show {
    opacity: 1;
    animation: messagePop 0.5s ease;
}

@keyframes messagePop {
    0% { transform: scale(0); }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* For very small devices */
@media (max-width: 360px) {
    .container {
        padding: 20px 15px;
    }
    
    button {
        min-width: 180px;
        padding: 15px 25px;
    }
}
</style>
</head>

<body>
    <!-- Decorative static hearts in background -->
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>
    <div class="decorative-heart">❤️</div>

    <div class="container">
        <h1>🎉 Happy Birthday My Love! 🎉</h1>
        
        <p>You make my world brighter every day ❤️</p>
        
        <div class="button-container">
            <button id="celebrateBtn" onclick="startCelebration()">🎈 Click to Celebrate! 🎈</button>
        </div>
        
        <div id="loveMessage" class="love-message"></div>
    </div>

    <script>
    let celebrationDone = false;

    function startCelebration() {
        if (celebrationDone) return;
        
        // Hide the button immediately
        document.getElementById('celebrateBtn').classList.add('hidden');
        
        // Start 3 second celebration animations with random patterns
        createConfetti(70);
        createHearts(60);
        createCheers(50);
        createSparkles(60);
        createBalloons(40);
        createStars(40);
        
        // After 3 seconds, show the love message
        setTimeout(() => {
            document.getElementById('loveMessage').classList.add('show');
            document.getElementById('loveMessage').innerHTML = "I love you! ❤️🎉";
            
            // Small final pop of celebration
            createConfetti(25);
            createHearts(20);
            createStars(15);
        }, 3000);
        
        celebrationDone = true;
    }

    // Confetti creator
    function createConfetti(count) {
        const colors = ['#ff1493', '#ff69b4', '#ffb6c1', '#ffd700', '#ff4500', '#ff8c00', '#ff00ff', '#ff6347'];
        
        for (let i = 0; i < count; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = Math.random() * 60 + 20 + '%'; // Start from different vertical positions
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 15 + 8 + 'px';
            confetti.style.height = Math.random() * 15 + 8 + 'px';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            document.body.appendChild(confetti);
            
            setTimeout(() => {
                confetti.remove();
            }, 5000);
        }
    }

    // Floating hearts creator
    function createHearts(count) {
        for (let i = 0; i < count; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓', '💘', '💝'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 70 + 15 + '%';
            heart.style.fontSize = Math.random() * 30 + 20 + 'px';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    }

    // Cheering emojis creator
    function createCheers(count) {
        const cheers = ['🎉', '🎊', '🥳', '🎂', '🎈', '✨', '⭐', '🌟', '💫', '⚡', '🔥', '💥', '🎆', '🎇'];
        
        for (let i = 0; i < count; i++) {
            const cheer = document.createElement('div');
            cheer.className = 'cheer';
            cheer.innerHTML = cheers[Math.floor(Math.random() * cheers.length)];
            cheer.style.left = Math.random() * 100 + '%';
            cheer.style.top = Math.random() * 60 + 20 + '%';
            cheer.style.fontSize = Math.random() * 30 + 30 + 'px';
            cheer.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(cheer);
            
            setTimeout(() => {
                cheer.remove();
            }, 5000);
        }
    }

    // Sparkles creator
    function createSparkles(count) {
        for (let i = 0; i < count; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 70 + 15 + '%';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            sparkle.style.backgroundColor = ['gold', '#ffd700', '#ffff00', '#ffa500', '#ff69b4'][Math.floor(Math.random() * 5)];
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 5000);
        }
    }

    // Balloons creator
    function createBalloons(count) {
        const balloons = ['🎈', '🎈', '🎈', '🎈', '🎈'];
        
        for (let i = 0; i < count; i++) {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.innerHTML = balloons[Math.floor(Math.random() * balloons.length)];
            balloon.style.left = Math.random() * 100 + '%';
            balloon.style.top = Math.random() * 70 + 15 + '%';
            balloon.style.fontSize = Math.random() * 30 + 25 + 'px';
            balloon.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(balloon);
            
            setTimeout(() => {
                balloon.remove();
            }, 5000);
        }
    }

    // Stars creator
    function createStars(count) {
        const stars = ['⭐', '🌟', '✨', '💫', '⭐'];
        
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = stars[Math.floor(Math.random() * stars.length)];
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 70 + 15 + '%';
            star.style.fontSize = Math.random() * 30 + 25 + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, 5000);
        }
    }

    // Add touch support for mobile
    if ('ontouchstart' in window) {
        document.getElementById('celebrateBtn').addEventListener('touchstart', function(e) {
            this.style.transform = 'scale(0.95)';
        });
        
        document.getElementById('celebrateBtn').addEventListener('touchend', function(e) {
            this.style.transform = 'scale(1)';
        });
    }
    </script>
</body>
</html>
